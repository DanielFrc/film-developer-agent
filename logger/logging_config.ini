[loggers]
keys = root

[handlers]
keys=timedFileHandler

[formatters]
keys = defaultFormatter

[logger_root]
level = INFO
handlers = timedFileHandler

[handler_timedFileHandler]
class = logging.handlers.TimedRotatingFileHandler
level = INFO
formatter = defaultFormatter
#args = ['logs/digitaltruthscrapper.log', 'midnight', 1, 30]
args = ['%(logfilename)s', 'midnight', 1, 30]



[formatter_defaultFormatter]
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt = %Y-%m-%d %H:%M:%S




services:
  etl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: film_dev_agent
    environment:
      - DATA_PATH=/data
    volumes:
      - ./data:/data
    command: python entrypoint.py

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: film_dev_api
    env_file:
      - .env
    environment:
      - DATA_PATH=/data
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    command: ["film-api"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    image: node:22-alpine
    container_name: film_dev_web
    working_dir: /app
    volumes:
      - ./apps/web:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
      - VITE_API_PROXY_TARGET=http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  # Production-style static build (optional): docker compose --profile prod up web-prod
  web-prod:
    profiles: ["prod"]
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: film_dev_web_prod
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  film_dev_data:
